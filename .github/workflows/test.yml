name: Test tap

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 15
    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
      - name: Tool versions
        run: |
          brew --version
          sw_vers
      - name: Check cask surface
        run: |
          ! grep -R "REPLACE_WITH_SHA256" Casks
          test ! -e Formula
          test ! -e Aliases
      - name: Check cask lifecycle
        run: ./scripts/test-cask-lifecycle-static.sh
      - name: Tap local repo
        run: brew tap hapticasensorics/tap "$PWD"
      - name: Audit cask
        run: brew audit --cask --strict --online hapticasensorics/tap/1context
      - name: Install cask
        run: brew install --cask hapticasensorics/tap/1context
      - name: Smoke test
        run: |
          1context --version
          1context status --debug
      - name: Uninstall cask
        run: brew uninstall --cask --zap hapticasensorics/tap/1context
      - name: Upgrade from previous public cask
        run: ./scripts/test-cask-upgrade-path.sh
