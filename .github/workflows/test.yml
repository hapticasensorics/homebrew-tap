name: Test tap

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check cask surface
        run: |
          ! grep -R "REPLACE_WITH_SHA256" Casks
          test ! -e Formula
          test ! -e Aliases
      - name: Tap local repo
        run: brew tap hapticasensorics/tap "$PWD"
      - name: Audit cask
        run: brew audit --cask --new hapticasensorics/tap/1context || true
      - name: Install cask
        run: brew install --cask hapticasensorics/tap/1context
      - name: Smoke test
        run: |
          1context --version
          1context status --debug || true
      - name: Uninstall cask
        run: brew uninstall --cask --zap hapticasensorics/tap/1context
